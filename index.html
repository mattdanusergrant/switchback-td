<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Switchback</title>
<meta name="description" content="Switchback — maze-building tower defence. Wind the path, hold the wave.">
<meta property="og:title" content="Switchback">
<meta property="og:description" content="Maze-building tower defence — wind the path, hold the wave.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #0b0d12; color: #e6ebff; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; }
  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 560px; margin: 0 auto; }
  #hud { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; padding: 8px 10px; background: #11141c; border-bottom: 1px solid #1c2030; font-size: 14px; }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat .lbl { color: #6a7290; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
  .stat .val { font-weight: 700; font-size: 16px; }
  .stat.lives .val { color: #ff6a82; }
  .stat.gold .val { color: #ffd47a; }
  .stat.wave .val { color: #7ee0ff; }
  .stat.lenb .val { color: #9fffa8; }
  #boardwrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: #0b0d12; overflow: hidden; }
  canvas { display: block; background: #15182a; border-radius: 6px; box-shadow: 0 0 20px rgba(0,0,0,0.6); }
  #banner { position: absolute; top: 10%; left: 0; right: 0; text-align: center; font-size: 22px; font-weight: 800; color: #ffaa55; text-shadow: 0 0 12px #ff5500; pointer-events: none; opacity: 0; transition: opacity 0.3s; padding: 0 10px; }
  #banner.show { opacity: 1; }
  #bottombar { background: #11141c; border-top: 1px solid #1c2030; padding: 8px; }
  #towers { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 6px; }
  .tower-btn { background: #1a1f30; border: 2px solid #2a3045; color: #e6ebff; padding: 8px 4px; border-radius: 6px; cursor: pointer; font-size: 11px; text-align: center; }
  .tower-btn.selected { border-color: #7ee0ff; background: #1f2940; }
  .tower-btn.poor { color: #6a7290; }
  .tower-btn .name { font-weight: 700; font-size: 13px; }
  .tower-btn .cost { color: #ffd47a; font-size: 11px; margin-top: 2px; }
  .tower-btn.poor .cost { color: #6a7290; }
  #actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .action-btn { background: #2a3045; border: none; color: #e6ebff; padding: 12px 6px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700; }
  .action-btn.primary { background: #2b6f4a; }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .action-btn:active:not(:disabled) { transform: translateY(1px); }
  #msg { text-align: center; font-size: 11px; color: #8a93b2; padding: 4px 0; min-height: 16px; }
  #overlay { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column; background: rgba(8, 10, 18, 0.94); z-index: 10; padding: 20px; }
  #overlay.show { display: flex; }
  #overlay h1 { font-size: 44px; margin-bottom: 8px; color: #7ee0ff; text-shadow: 0 0 14px #2090d0; letter-spacing: 0.12em; }
  #overlay p { color: #aab; margin-bottom: 18px; text-align: center; max-width: 340px; font-size: 14px; line-height: 1.5; }
  #overlay .stats { margin: 8px 0 18px; color: #ffd47a; text-align: center; font-size: 15px; }
  #overlay .stats .row { margin: 4px 0; }
  #overlay button { padding: 14px 32px; font-size: 16px; font-weight: 700; background: #2b6f4a; border: none; color: white; border-radius: 8px; cursor: pointer; letter-spacing: 0.04em; }
  #overlay .tip { font-size: 12px; color: #6a7290; margin-top: 14px; max-width: 320px; text-align: center; }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="stat wave"><span class="lbl">Wave</span><span class="val" id="wave">0</span></div>
    <div class="stat lives"><span class="lbl">Lives</span><span class="val" id="lives">20</span></div>
    <div class="stat gold"><span class="lbl">Gold</span><span class="val" id="gold">200</span></div>
    <div class="stat lenb"><span class="lbl">Length</span><span class="val" id="lenb">+0%</span></div>
  </div>
  <div id="boardwrap">
    <canvas id="cv"></canvas>
    <div id="banner"></div>
    <div id="overlay" class="show">
      <h1 id="ov-title">Switchback</h1>
      <p id="ov-desc">Place towers to wind the path the creeps walk. Longer maze = more damage. Hold them off — wave by wave.</p>
      <div class="stats" id="ov-stats"></div>
      <button id="ov-btn">Start</button>
      <div class="tip">Tap an empty tile to build. Tap a tower to select for sell or merge. Place towers <b>between waves</b>.</div>
    </div>
  </div>
  <div id="bottombar">
    <div id="towers"></div>
    <div id="actions">
      <button class="action-btn" id="sell-btn" disabled>Sell</button>
      <button class="action-btn" id="merge-btn" disabled>Merge ×3</button>
      <button class="action-btn primary" id="wave-btn">Start Wave</button>
    </div>
    <div id="msg"></div>
  </div>
</div>
<script>
// === CONFIG ===
const COLS = 11, ROWS = 15;
const ENTRY = { c: 5, r: 0 };
const EXIT  = { c: 5, r: ROWS - 1 };
const BASELINE_PATH = ROWS - 1;

const TOWERS = {
  bolt:   { name:'Bolt',   cost:50,  dmg:8,  range:3.3, rate:1.0, color:'#7ee0ff', proj:'#dffaff', tier:1 },
  splash: { name:'Splash', cost:100, dmg:6,  range:3.0, rate:0.7, color:'#ffae55', proj:'#ffae55', splash:1.4, tier:1 },
  frost:  { name:'Frost',  cost:80,  dmg:2,  range:2.8, rate:1.0, color:'#aaddff', proj:'#aaddff', slow:0.45, slowDur:1.6, tier:1 },
};
const TOWERS_T2 = {
  bolt:   { name:'Bolt II',   dmg:26, range:4.0, rate:1.2, color:'#bff5ff', proj:'#ffffff', tier:2 },
  splash: { name:'Splash II', dmg:14, range:3.4, rate:0.9, color:'#ffd07a', proj:'#ffd07a', splash:1.9, tier:2 },
  frost:  { name:'Frost II',  dmg:6,  range:3.5, rate:1.1, color:'#cfe8ff', proj:'#cfe8ff', slow:0.65, slowDur:2.0, tier:2 },
};

const CREEPS = {
  standard: { hp:20, speed:1.4, bounty:4, color:'#aab2c8', size:0.32 },
  fast:     { hp:10, speed:2.8, bounty:3, color:'#ffe066', size:0.28 },
  armored:  { hp:55, speed:0.9, bounty:8, color:'#8a8a99', size:0.40, armor:0.5 },
  swarm:    { hp:5,  speed:1.8, bounty:1, color:'#ff8aa0', size:0.22 },
  air:      { hp:30, speed:1.9, bounty:6, color:'#dbe2ff', size:0.32, flying:true },
  boss:     { hp:220,speed:0.8, bounty:80, color:'#ff6a82', size:0.55, boss:true, armor:0.25 },
};

const BOSS_NAMES = ['Vorlak the Unending', 'Mournwight', 'Thresh-Iron Warden', 'Cinderwidow', 'Pale Margrave', 'The Long Knell'];

// === STATE ===
let cv, ctx, cell = 32, gW, gH;
let state;
let hoverCell = null;

function newState() {
  return {
    phase: 'TITLE',
    wave: 0,
    lives: 20,
    gold: 200,
    grid: Array.from({length: ROWS}, () => Array(COLS).fill(null)),
    path: null,
    creeps: [],
    projectiles: [],
    effects: [],
    selectedTower: 'bolt',
    selectedCell: null,
    waveQueue: [],
    spawnTimer: 0,
    waveActive: false,
    bossName: '',
  };
}

// === PATHFINDING ===
function findPathOn(grid) {
  const dist = Array.from({length: ROWS}, () => Array(COLS).fill(-1));
  const prev = Array.from({length: ROWS}, () => Array(COLS).fill(null));
  dist[ENTRY.r][ENTRY.c] = 0;
  const q = [{ c: ENTRY.c, r: ENTRY.r }];
  let qi = 0;
  while (qi < q.length) {
    const { c, r } = q[qi++];
    if (c === EXIT.c && r === EXIT.r) break;
    for (const [dc, dr] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nc = c+dc, nr = r+dr;
      if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) continue;
      if (grid[nr][nc]) continue;
      if (dist[nr][nc] !== -1) continue;
      dist[nr][nc] = dist[r][c]+1;
      prev[nr][nc] = { c, r };
      q.push({ c: nc, r: nr });
    }
  }
  if (dist[EXIT.r][EXIT.c] === -1) return null;
  const path = [];
  let cur = { c: EXIT.c, r: EXIT.r };
  while (cur) { path.unshift({c:cur.c, r:cur.r}); cur = prev[cur.r][cur.c]; }
  return path;
}

function recomputePath() { state.path = findPathOn(state.grid); }
function pathLength() { return state.path ? state.path.length - 1 : 0; }
function lengthBonus() { return 1 + Math.max(0, pathLength() - BASELINE_PATH) * 0.006; }

// === PLACEMENT ===
function canPlace(c, r) {
  if (c === ENTRY.c && r === ENTRY.r) return false;
  if (c === EXIT.c  && r === EXIT.r)  return false;
  if (state.grid[r][c]) return false;
  state.grid[r][c] = { type: '_test_' };
  const ok = !!findPathOn(state.grid);
  state.grid[r][c] = null;
  return ok;
}

function placeTower(c, r) {
  if (state.waveActive) { setMsg('Build between waves.'); return; }
  const tdef = TOWERS[state.selectedTower];
  if (state.gold < tdef.cost) { setMsg('Not enough gold.'); return; }
  if (state.grid[r][c]) { setMsg('Tile occupied.'); return; }
  if (!canPlace(c, r)) { setMsg('That would seal the path.'); return; }
  state.grid[r][c] = { type: state.selectedTower, tier: 1, cooldown: 0, c, r };
  state.gold -= tdef.cost;
  recomputePath();
  state.selectedCell = null;
  syncHUD();
}

function sellSelected() {
  const t = state.selectedCell;
  if (!t) return;
  const tower = state.grid[t.r][t.c];
  if (!tower) return;
  const baseCost = TOWERS[tower.type].cost * (tower.tier === 2 ? 3 : 1);
  state.gold += Math.floor(baseCost * 0.7);
  state.grid[t.r][t.c] = null;
  state.selectedCell = null;
  recomputePath();
  syncHUD();
}

function mergeSelected() {
  const t = state.selectedCell;
  if (!t) return;
  const tower = state.grid[t.r][t.c];
  if (!tower || tower.tier !== 1) return;
  const same = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const o = state.grid[r][c];
    if (o && o.type === tower.type && o.tier === 1 && !(c === t.c && r === t.r)) same.push({c,r});
  }
  if (same.length < 2) { setMsg('Need 2 more tier-1 ' + TOWERS[tower.type].name + 's.'); return; }
  for (const s of same.slice(0,2)) state.grid[s.r][s.c] = null;
  tower.tier = 2;
  tower.cooldown = 0;
  recomputePath();
  setMsg(TOWERS[tower.type].name + ' merged to tier 2.');
  syncHUD();
}

// === WAVES ===
function makeWave(n) {
  const q = [];
  if (n % 10 === 0) {
    state.bossName = BOSS_NAMES[Math.floor(Math.random()*BOSS_NAMES.length)];
    q.push({ type:'boss', delay:0.5, hpMul: 1 + n*0.18, bountyMul: 1 + (n/10) });
    for (let i = 0; i < 6; i++) q.push({ type:'standard', delay:0.6, hpMul: 1 + n*0.15 });
    return q;
  }
  const count = 6 + n * 2;
  const pool = ['standard'];
  if (n >= 3) pool.push('fast');
  if (n >= 4) pool.push('armored');
  if (n >= 5) pool.push('swarm','swarm');
  if (n >= 6 && n % 2 === 0) pool.push('air');
  const hpMul = 1 + n * 0.20;
  for (let i = 0; i < count; i++) {
    const t = pool[Math.floor(Math.random()*pool.length)];
    q.push({ type: t, delay: t === 'swarm' ? 0.18 : 0.5, hpMul });
  }
  return q;
}

function startWave() {
  if (state.waveActive) return;
  state.wave += 1;
  state.waveQueue = makeWave(state.wave);
  state.spawnTimer = 0;
  state.waveActive = true;
  if (state.wave % 10 === 0) showBanner('Wave ' + state.wave + ' — ' + state.bossName);
  else showBanner('Wave ' + state.wave);
  syncHUD();
}

function endWaveIfDone() {
  if (state.waveActive && state.waveQueue.length === 0 && state.creeps.length === 0) {
    state.waveActive = false;
    const interest = Math.floor(state.gold * 0.05);
    state.gold += interest;
    setMsg('Wave cleared. +' + interest + ' interest.');
    syncHUD();
  }
}

function spawnCreep(spec) {
  const c = CREEPS[spec.type];
  const hp = c.hp * (spec.hpMul || 1);
  state.creeps.push({
    type: spec.type, x: ENTRY.c + 0.5, y: ENTRY.r + 0.5,
    hp, maxhp: hp, baseSpeed: c.speed,
    color: c.color, size: c.size, flying: !!c.flying, boss: !!c.boss, armor: c.armor || 0,
    bounty: Math.floor(c.bounty * (spec.bountyMul || 1)),
    slow: 0, slowUntil: 0, hitFlash: 0,
  });
}

// === COMBAT ===
function damageCreep(cr, dmg) {
  const eff = dmg * (1 - cr.armor);
  cr.hp -= eff;
  cr.hitFlash = 0.1;
  state.effects.push({ type:'dmg', x: cr.x, y: cr.y - 0.2, text: Math.ceil(eff), age: 0, life: 0.8 });
  if (cr.hp <= 0 && !cr.dead) {
    cr.dead = true;
    state.gold += cr.bounty;
    state.effects.push({ type:'poof', x: cr.x, y: cr.y, age: 0, life: 0.4, color: cr.color });
    syncHUD();
  }
}

function applySlow(cr, slow, dur) {
  const now = performance.now()/1000;
  if (slow > cr.slow || now > cr.slowUntil) cr.slow = slow;
  cr.slowUntil = now + dur;
}

// === UPDATE ===
function update(dt) {
  // spawn
  if (state.waveActive && state.waveQueue.length > 0) {
    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0) {
      const spec = state.waveQueue.shift();
      spawnCreep(spec);
      state.spawnTimer = spec.delay;
    }
  }

  // creep motion
  const now = performance.now()/1000;
  for (const cr of state.creeps) {
    if (cr.dead) continue;
    if (cr.hitFlash > 0) cr.hitFlash -= dt;
    if (now > cr.slowUntil) cr.slow = 0;
    const sp = cr.baseSpeed * (1 - cr.slow);
    let tx, ty;
    if (cr.flying) {
      tx = EXIT.c + 0.5; ty = EXIT.r + 0.5;
    } else if (!state.path) {
      continue;
    } else {
      const cc = Math.floor(cr.x), rr = Math.floor(cr.y);
      let idx = -1;
      for (let i = 0; i < state.path.length; i++) {
        if (state.path[i].c === cc && state.path[i].r === rr) { idx = i; break; }
      }
      if (idx < 0) {
        // off-path (path changed under us) — head to nearest path cell
        let best = null, bd = Infinity;
        for (const p of state.path) {
          const d = Math.hypot(p.c + 0.5 - cr.x, p.r + 0.5 - cr.y);
          if (d < bd) { bd = d; best = p; }
        }
        tx = best.c + 0.5; ty = best.r + 0.5;
      } else if (idx === state.path.length - 1) {
        tx = EXIT.c + 0.5; ty = EXIT.r + 0.5;
      } else {
        const nxt = state.path[idx + 1];
        tx = nxt.c + 0.5; ty = nxt.r + 0.5;
      }
    }
    const dx = tx - cr.x, dy = ty - cr.y;
    const d = Math.hypot(dx, dy);
    if (d < 0.02) { cr.x = tx; cr.y = ty; }
    else { cr.x += dx/d * sp * dt; cr.y += dy/d * sp * dt; }
    if (Math.abs(cr.x - (EXIT.c + 0.5)) < 0.25 && Math.abs(cr.y - (EXIT.r + 0.5)) < 0.25) {
      cr.leaked = true;
      state.lives -= cr.boss ? 5 : 1;
      syncHUD();
      if (state.lives <= 0) { gameOver(); return; }
    }
  }
  state.creeps = state.creeps.filter(c => !c.dead && !c.leaked);

  // towers fire
  const lenMul = lengthBonus();
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = state.grid[r][c];
    if (!t) continue;
    t.cooldown -= dt;
    if (t.cooldown > 0) continue;
    const def = t.tier === 2 ? TOWERS_T2[t.type] : TOWERS[t.type];
    let target = null, bestProg = -Infinity;
    for (const cr of state.creeps) {
      if (cr.dead) continue;
      const d = Math.hypot(cr.x - (c + 0.5), cr.y - (r + 0.5));
      if (d > def.range) continue;
      const prog = cr.flying ? cr.y * 10 : cr.y * 10 + cr.x * 0.01;
      if (prog > bestProg) { bestProg = prog; target = cr; }
    }
    if (!target) continue;
    t.cooldown = 1 / def.rate;
    state.projectiles.push({
      x: c + 0.5, y: r + 0.5, tx: target.x, ty: target.y,
      target, speed: 14, def, color: def.proj, lenMul,
    });
  }

  // projectiles
  for (const p of state.projectiles) {
    if (p.dead) continue;
    if (p.target && !p.target.dead) { p.tx = p.target.x; p.ty = p.target.y; }
    const dx = p.tx - p.x, dy = p.ty - p.y;
    const d = Math.hypot(dx, dy);
    const step = p.speed * dt;
    if (d <= step) {
      const dmg = p.def.dmg * p.lenMul;
      if (p.def.splash) {
        for (const cr of state.creeps) {
          if (cr.dead || cr.flying) continue;
          if (Math.hypot(cr.x - p.tx, cr.y - p.ty) <= p.def.splash) damageCreep(cr, dmg);
        }
        state.effects.push({ type:'boom', x: p.tx, y: p.ty, age: 0, life: 0.35, r: p.def.splash, color: p.color });
      } else {
        if (p.target && !p.target.dead) {
          damageCreep(p.target, dmg);
          if (p.def.slow) applySlow(p.target, p.def.slow, p.def.slowDur);
        }
      }
      p.dead = true;
    } else {
      p.x += dx/d * step;
      p.y += dy/d * step;
    }
  }
  state.projectiles = state.projectiles.filter(p => !p.dead);

  for (const e of state.effects) e.age += dt;
  state.effects = state.effects.filter(e => e.age < e.life);

  endWaveIfDone();
}

// === DRAW ===
function draw() {
  ctx.clearRect(0, 0, gW, gH);
  // grid tiles
  ctx.fillStyle = '#1a1e2e';
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    ctx.fillRect(c*cell+1, r*cell+1, cell-2, cell-2);
  }
  // path highlight
  if (state.path) {
    ctx.fillStyle = 'rgba(126,224,255,0.09)';
    for (const p of state.path) ctx.fillRect(p.c*cell+1, p.r*cell+1, cell-2, cell-2);
    ctx.strokeStyle = 'rgba(126,224,255,0.55)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    state.path.forEach((p,i) => {
      const x = (p.c+0.5)*cell, y = (p.r+0.5)*cell;
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
  }
  // entry/exit
  drawSpecialTile(ENTRY.c, ENTRY.r, '#2b6f4a', 'IN');
  drawSpecialTile(EXIT.c,  EXIT.r,  '#a83a3a', 'OUT');
  // hover preview
  if (hoverCell && !state.waveActive && state.phase === 'PLAYING') {
    const { c, r } = hoverCell;
    const occupied = state.grid[r][c];
    if (!occupied && !(c === ENTRY.c && r === ENTRY.r) && !(c === EXIT.c && r === EXIT.r)) {
      const def = TOWERS[state.selectedTower];
      const ok = state.gold >= def.cost && canPlace(c, r);
      ctx.strokeStyle = ok ? '#7ee0ff90' : '#ff5a5a90';
      ctx.lineWidth = 2;
      ctx.strokeRect(c*cell+2, r*cell+2, cell-4, cell-4);
    }
  }
  // towers
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = state.grid[r][c];
    if (!t) continue;
    const def = t.tier === 2 ? TOWERS_T2[t.type] : TOWERS[t.type];
    const cx = c*cell + cell/2, cy = r*cell + cell/2;
    ctx.fillStyle = '#22263a';
    ctx.fillRect(c*cell+3, r*cell+3, cell-6, cell-6);
    ctx.fillStyle = def.color;
    ctx.beginPath();
    if (t.tier === 2) {
      ctx.moveTo(cx, cy - cell*0.32);
      ctx.lineTo(cx + cell*0.32, cy);
      ctx.lineTo(cx, cy + cell*0.32);
      ctx.lineTo(cx - cell*0.32, cy);
      ctx.closePath();
    } else {
      ctx.arc(cx, cy, cell*0.28, 0, Math.PI*2);
    }
    ctx.fill();
    // selection ring
    if (state.selectedCell && state.selectedCell.c === c && state.selectedCell.r === r) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(c*cell+2, r*cell+2, cell-4, cell-4);
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.beginPath();
      ctx.arc(cx, cy, def.range*cell, 0, Math.PI*2);
      ctx.stroke();
    }
  }
  // creeps
  for (const cr of state.creeps) {
    const cx = cr.x*cell, cy = cr.y*cell;
    ctx.fillStyle = cr.hitFlash > 0 ? '#fff' : cr.color;
    if (cr.flying) {
      ctx.beginPath();
      ctx.moveTo(cx, cy - cell*cr.size);
      ctx.lineTo(cx + cell*cr.size, cy);
      ctx.lineTo(cx, cy + cell*cr.size);
      ctx.lineTo(cx - cell*cr.size, cy);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(cx, cy, cell*cr.size, 0, Math.PI*2);
      ctx.fill();
    }
    if (cr.boss) {
      ctx.strokeStyle = '#ffe066';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    // hp bar
    const barW = cell * (cr.boss ? 0.85 : 0.5);
    const hpF = Math.max(0, cr.hp / cr.maxhp);
    ctx.fillStyle = '#000';
    ctx.fillRect(cx - barW/2, cy - cell*cr.size - 6, barW, 3);
    ctx.fillStyle = hpF > 0.5 ? '#6f6' : hpF > 0.25 ? '#fc6' : '#f55';
    ctx.fillRect(cx - barW/2, cy - cell*cr.size - 6, barW*hpF, 3);
    if (cr.slow > 0) {
      ctx.strokeStyle = '#aaddff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx, cy, cell*cr.size + 2, 0, Math.PI*2);
      ctx.stroke();
    }
  }
  // projectiles
  for (const p of state.projectiles) {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x*cell, p.y*cell, 3, 0, Math.PI*2);
    ctx.fill();
  }
  // effects
  for (const e of state.effects) {
    const a = 1 - e.age / e.life;
    if (e.type === 'dmg') {
      ctx.fillStyle = `rgba(255,200,80,${a})`;
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(e.text, e.x*cell, e.y*cell - 30*(1-a));
    } else if (e.type === 'poof') {
      ctx.strokeStyle = `rgba(200,200,220,${a})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(e.x*cell, e.y*cell, (1-a)*cell*0.4, 0, Math.PI*2);
      ctx.stroke();
    } else if (e.type === 'boom') {
      ctx.strokeStyle = `rgba(255,170,80,${a*0.85})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(e.x*cell, e.y*cell, e.r*cell*(1-a*0.4), 0, Math.PI*2);
      ctx.stroke();
    }
  }
}

function drawSpecialTile(c, r, color, label) {
  ctx.fillStyle = color;
  ctx.fillRect(c*cell+1, r*cell+1, cell-2, cell-2);
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.max(9, cell*0.28)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, c*cell + cell/2, r*cell + cell/2);
}

// === UI ===
function syncHUD() {
  document.getElementById('wave').textContent = state.wave;
  document.getElementById('lives').textContent = Math.max(0, state.lives);
  document.getElementById('gold').textContent = state.gold;
  const lb = Math.round((lengthBonus() - 1) * 100);
  document.getElementById('lenb').textContent = '+' + lb + '%';
  document.querySelectorAll('.tower-btn').forEach(b => {
    const type = b.dataset.type;
    const def = TOWERS[type];
    b.classList.toggle('selected', state.selectedTower === type);
    b.classList.toggle('poor', state.gold < def.cost);
  });
  const sel = state.selectedCell ? state.grid[state.selectedCell.r][state.selectedCell.c] : null;
  document.getElementById('sell-btn').disabled = !sel || state.waveActive;
  let canMerge = false;
  if (sel && sel.tier === 1) {
    let count = 0;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const o = state.grid[r][c];
      if (o && o.type === sel.type && o.tier === 1) count++;
    }
    canMerge = count >= 3;
  }
  document.getElementById('merge-btn').disabled = !canMerge || state.waveActive;
  const wb = document.getElementById('wave-btn');
  wb.textContent = state.waveActive ? 'Wave running…' : 'Start Wave';
  wb.disabled = state.waveActive;
}

function setMsg(m) {
  document.getElementById('msg').textContent = m;
  clearTimeout(setMsg._to);
  setMsg._to = setTimeout(() => { document.getElementById('msg').textContent = ''; }, 2400);
}

function showBanner(text) {
  const b = document.getElementById('banner');
  b.textContent = text;
  b.classList.add('show');
  clearTimeout(showBanner._to);
  showBanner._to = setTimeout(() => b.classList.remove('show'), 2200);
}

function gameOver() {
  state.phase = 'GAMEOVER';
  state.waveActive = false;
  const o = document.getElementById('overlay');
  document.getElementById('ov-title').textContent = 'Overrun';
  document.getElementById('ov-desc').textContent = 'The path ran out. Try a longer maze next time.';
  document.getElementById('ov-stats').innerHTML = `
    <div class="row">Waves cleared: <b>${state.wave - 1}</b></div>
    <div class="row">Gold banked: <b>${state.gold}</b></div>
    <div class="row">Path length: <b>${pathLength()} tiles</b></div>
    <div class="row">Length bonus: <b>+${Math.round((lengthBonus()-1)*100)}%</b></div>
  `;
  document.getElementById('ov-btn').textContent = 'Again';
  o.classList.add('show');
}

function startGame() {
  state = newState();
  state.phase = 'PLAYING';
  recomputePath();
  document.getElementById('overlay').classList.remove('show');
  buildTowerBar();
  syncHUD();
}

function buildTowerBar() {
  const wrap = document.getElementById('towers');
  wrap.innerHTML = '';
  for (const [key, def] of Object.entries(TOWERS)) {
    const b = document.createElement('button');
    b.className = 'tower-btn';
    b.dataset.type = key;
    b.innerHTML = `<div class="name">${def.name}</div><div class="cost">${def.cost}g</div>`;
    b.onclick = () => { state.selectedTower = key; state.selectedCell = null; syncHUD(); };
    wrap.appendChild(b);
  }
}

// === RESIZE ===
function resize() {
  const wrap = document.getElementById('boardwrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  cell = Math.max(16, Math.floor(Math.min(w / COLS, h / ROWS)));
  gW = cell * COLS;
  gH = cell * ROWS;
  cv.width = gW; cv.height = gH;
  cv.style.width = gW + 'px';
  cv.style.height = gH + 'px';
}

// === INPUT ===
function cellFromEvent(e) {
  const rect = cv.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const c = Math.floor(x / cell);
  const r = Math.floor(y / cell);
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return null;
  return { c, r };
}

function onTap(e) {
  e.preventDefault();
  if (state.phase !== 'PLAYING') return;
  const p = cellFromEvent(e);
  if (!p) return;
  const existing = state.grid[p.r][p.c];
  if (existing) {
    state.selectedCell = p;
  } else {
    state.selectedCell = null;
    placeTower(p.c, p.r);
  }
  syncHUD();
}

function onMove(e) { hoverCell = cellFromEvent(e); }

// === BOOT ===
window.addEventListener('DOMContentLoaded', () => {
  cv = document.getElementById('cv');
  ctx = cv.getContext('2d');
  state = newState();
  resize();
  window.addEventListener('resize', resize);
  cv.addEventListener('pointerdown', onTap);
  cv.addEventListener('pointermove', onMove);
  cv.addEventListener('pointerleave', () => { hoverCell = null; });
  document.getElementById('sell-btn').onclick = sellSelected;
  document.getElementById('merge-btn').onclick = mergeSelected;
  document.getElementById('wave-btn').onclick = startWave;
  document.getElementById('ov-btn').onclick = startGame;

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    if (state.phase === 'PLAYING') update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
